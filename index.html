<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0F111A; font-family: 'Geist', sans-serif; color: #e2e8f0; -webkit-font-smoothing: antialiased; }
    .mono { font-family: 'Geist Mono', monospace; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 2px; }
    .recharts-surface { overflow: visible; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes shimmer { 0%,100% { opacity:.4; } 50% { opacity:1; } }
    .fade-up { animation: fadeUp .4s ease both; }
    .fade-up-1 { animation: fadeUp .4s .08s ease both; }
    .fade-up-2 { animation: fadeUp .4s .16s ease both; }
    .fade-up-3 { animation: fadeUp .4s .24s ease both; }
    .fade-up-4 { animation: fadeUp .4s .32s ease both; }
    .fade-up-5 { animation: fadeUp .4s .40s ease both; }
    .loading-pulse { animation: shimmer 1.4s ease infinite; }
    .bento-card { background: #161B22; border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; transition: border-color .2s; }
    .bento-card:hover { border-color: rgba(255,255,255,0.1); }
    .positive { color: #10b981; }
    .negative { color: #f87171; }
    .neutral  { color: #94a3b8; }
    .pill-active { background: rgba(99,102,241,0.2); color: #818cf8; border: 1px solid rgba(99,102,241,0.3); }
    .pill-inactive { background: transparent; color: #64748b; border: 1px solid transparent; }
    .pill-inactive:hover { color: #94a3b8; background: rgba(255,255,255,0.04); }
    .row-hover { transition: background .15s; }
    .row-hover:hover { background: rgba(255,255,255,0.03); }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            base: '#0F111A',
            card: '#161B22',
            card2: '#1a2030',
          }
        }
      }
    }
  </script>
</head>
<body>
<div id="root"></div>

const GROUP_META = {

  { date:'30 MAR', ticker:'TZXD7',         desc:'Comprar BONCER Dic 2027 · $50.000 ARS',                urgency:'hot' },
  { date:'30 MAR', ticker:'BTC',           desc:'Comprar $60.000 ARS en Binance · avg → USD 80K',       urgency:'hot' },
  { date:'1 ABR',  ticker:'SPY',           desc:'Vender 4 CEDEARs IOL → comprar fraccionario Tasty',    urgency:'warm' },
  { date:'1 ABR',  ticker:'VWO·EWZ·GLD',  desc:'Primera compra fraccionaria Tastytrade · ~USD 110',     urgency:'warm' },
  { date:'1 ABR',  ticker:'MELI',          desc:'Fraccionario Tastytrade · mín 52s USD 1.631',           urgency:'warm' },
  { date:'29 ABR', ticker:'VIST',          desc:'Earnings Q1 · evaluar reentrada (vendida +35%)',        urgency:'cold' },
  { date:'8 MAY',  ticker:'YPFD',          desc:'Earnings Q1 · evaluar reentrada USD 40-42 en Tasty',   urgency:'cold' },

  { date:'20 MAY', ticker:'NVDA',          desc:'Earnings Q1 · evaluar migrar CEDEARs a Tastytrade',    urgency:'cold' },
];

// Generate chart data
function genChartData(days, base, vol) {
  const d = []; let v = base;
  const now = new Date();
  for (let i = days; i >= 0; i--) {
    const dt = new Date(now); dt.setDate(dt.getDate() - i);
    v = Math.max(v * (1 + (Math.random()-.48) * vol), base * 0.7);
    d.push({
      date: dt.toLocaleDateString('es-AR', { day:'2-digit', month:'2-digit' }),
      fullDate: dt.toLocaleDateString('es-AR', { day:'2-digit', month:'short', year:'numeric' }),
      value: Math.round(v)
    });
  }
  return d;
}

const CHART_DATA = {
  '1D':  genChartData(1,   980000, 0.008),
  '1S':  genChartData(7,   950000, 0.012),
  '1M':  genChartData(30,  900000, 0.018),
  '6M':  genChartData(180, 780000, 0.022),
  'YTD': genChartData(89,  820000, 0.020),
  '1A':  genChartData(365, 650000, 0.025),
};

// ═══════════════════════════════════════════
// PRICE FETCHING
// ═══════════════════════════════════════════

async function fetchLivePrice(sym) {
  const urls = [
    `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=1d`)}`,
    `https://corsproxy.io/?${encodeURIComponent(`https://query2.finance.yahoo.com/v8/finance/chart/${sym}`)}`,
  ];
  for (const u of urls) {
    try {
      const r = await fetch(u, { signal: AbortSignal.timeout(5000) });
      const d = await r.json();
      const p = d?.chart?.result?.[0]?.meta?.regularMarketPrice;
      if (p) return p;
    } catch {}
  }
  return null;
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════

function n(v, d=0) {
  if (v == null || isNaN(v)) return '—';
  return v.toLocaleString('es-AR', { minimumFractionDigits:d, maximumFractionDigits:d });
}

function getPriceARS(pos, prices) {
  if (STATIC_PRICES[pos.ticker]) return STATIC_PRICES[pos.ticker];
  const s = pos.sym;
  if (s && prices[s]) return prices[s] * (pos.ratio || 1) * MEP;
  return null;
}

// ═══════════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════════

const CustomTooltip = ({ active, payload, label }) => {
  if (!active || !payload?.length) return null;
  return (
    <div className="bento-card px-4 py-3 shadow-2xl" style={{ minWidth: 160 }}>
      <p className="text-xs text-slate-500 mb-1">{payload[0]?.payload?.fullDate || label}</p>
      <p className="mono text-sm font-semibold text-white">${n(payload[0]?.value)}</p>
    </div>
  );
};

// ═══════════════════════════════════════════
// CHART COMPONENT
// ═══════════════════════════════════════════

function PerformanceChart({ prices }) {
  const [period, setPeriod] = useState('1M');
  const data = CHART_DATA[period];
  const first = data[0]?.value || 1;
  const last  = data[data.length-1]?.value || 1;
  const change = ((last - first) / first * 100);
  const isUp = change >= 0;
  const accentColor = isUp ? '#6366f1' : '#f87171';

  const periods = ['1D','1S','1M','6M','YTD','1A'];

  return (
    <div className="h-full flex flex-col">
      <div className="flex items-center justify-between mb-5">
        <div>
          <p className="text-xs text-slate-500 mono uppercase tracking-widest mb-1">Rendimiento del portafolio</p>
          <p className="mono text-2xl font-semibold text-white">${n(last)}</p>
          <p className={`mono text-xs mt-1 ${isUp ? 'positive' : 'negative'}`}>
            {isUp ? '▲' : '▼'} {Math.abs(change).toFixed(2)}% en el período
          </p>
        </div>
        <div className="flex gap-1 p-1 rounded-xl" style={{ background:'rgba(255,255,255,0.03)', border:'1px solid rgba(255,255,255,0.06)' }}>
          {periods.map(p => (
            <button
              key={p}
              onClick={() => setPeriod(p)}
              className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-all mono cursor-pointer ${p === period ? 'pill-active' : 'pill-inactive'}`}
            >{p}</button>
          ))}
        </div>
      </div>

      <div className="flex-1 min-h-0">
        <ResponsiveContainer width="100%" height="100%">
          <AreaChart data={data} margin={{ top: 8, right: 4, bottom: 0, left: 0 }}>
            <defs>
              <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={accentColor} stopOpacity={0.25}/>
                <stop offset="100%" stopColor={accentColor} stopOpacity={0}/>
              </linearGradient>
            </defs>
            <CartesianGrid vertical={false} horizontal={false} />
            <XAxis
              dataKey="date"
              tick={{ fontSize: 10, fill: '#475569', fontFamily: 'Geist Mono' }}
              axisLine={false}
              tickLine={false}
              interval={Math.floor(data.length / 5)}
            />
            <YAxis hide domain={['auto','auto']} />
            <Tooltip content={<CustomTooltip />} cursor={{ stroke: 'rgba(255,255,255,0.08)', strokeWidth: 1 }} />
            <Area
              type="monotone"
              dataKey="value"
              stroke={accentColor}
              strokeWidth={2}
              fill="url(#grad)"
              dot={false}
              activeDot={{ r: 4, fill: accentColor, stroke: '#0F111A', strokeWidth: 2 }}
            />
          </AreaChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// DISTRIBUTION DONUT
// ═══════════════════════════════════════════

function DistributionCard({ prices }) {
  const groupVals = {};
  IOL_POSITIONS.forEach(p => {
    const px = getPriceARS(p, prices);
    const val = px ? px * p.qty : p.cost * p.qty;
    groupVals[p.group] = (groupVals[p.group] || 0) + val;
  });
  const total = Object.values(groupVals).reduce((a,b) => a+b, 0);
  const order = ['tech','energy','al30','cer','ar'];

  // Simple SVG donut
  const size = 120, cx = 60, cy = 60, r = 48, stroke = 12;
  const circ = 2 * Math.PI * r;
  let offset = 0;
  const slices = order.map(k => {
    const pct = total ? (groupVals[k]||0)/total : 0;
    const dash = pct * circ;
    const gap  = circ - dash;
    const s = { key: k, dash, gap, offset, pct, color: GROUP_META[k].color };
    offset += dash;
    return s;
  });

  return (
    <div className="h-full flex flex-col">
      <p className="text-xs text-slate-500 mono uppercase tracking-widest mb-4">Distribución cartera</p>
      <div className="flex items-center gap-6 flex-1">
        <div className="relative flex-shrink-0" style={{width:size,height:size}}>
          <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
            <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth={stroke}/>
            {slices.map(s => s.pct > 0 && (
              <circle
                key={s.key}
                cx={cx} cy={cy} r={r}
                fill="none"
                stroke={s.color}
                strokeWidth={stroke}
                strokeDasharray={`${s.dash} ${s.gap}`}
                strokeDashoffset={-s.offset + circ/4}
                style={{ transform:`rotate(-90deg)`, transformOrigin:`${cx}px ${cy}px`, transition:'stroke-dasharray .6s ease' }}
              />
            ))}
          </svg>
          <div className="absolute inset-0 flex flex-col items-center justify-center">
            <span className="mono text-xs font-semibold text-white">${n(total/1000000,1)}M</span>
            <span className="mono text-xs text-slate-500">ARS</span>
          </div>
        </div>
        <div className="flex-1 space-y-2.5">
          {order.map(k => {
            const pct = total ? ((groupVals[k]||0)/total*100) : 0;
            return (
              <div key={k}>
                <div className="flex items-center justify-between mb-1">
                  <div className="flex items-center gap-2">
                    <div className="w-2 h-2 rounded-full flex-shrink-0" style={{background:GROUP_META[k].color}}/>
                    <span className="text-xs text-slate-400">{GROUP_META[k].label}</span>
                  </div>
                  <span className="mono text-xs font-semibold text-white">{pct.toFixed(0)}%</span>
                </div>
                <div className="h-1 rounded-full" style={{background:'rgba(255,255,255,0.05)'}}>
                  <div className="h-1 rounded-full transition-all duration-700" style={{width:`${pct}%`,background:GROUP_META[k].color}}/>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

    <span className={`inline-flex items-center px-2 py-0.5 rounded-md text-xs mono font-semibold ${styles[type]||styles.hold}`}>

}

function IOLTable({ prices }) {
  const groups = [
    { k:'cer',    l:'Bonos CER' },
    { k:'al30',   l:'Bono USD' },
    { k:'tech',   l:'CEDEARs Tech' },
    { k:'energy', l:'Energía' },
    { k:'ar',     l:'Acciones AR' },
  ];

  return (
    <table className="w-full">
      <thead>
        <tr>
          {['Activo','Cant.','Precio ARS','Total ARS','P&L','Estado'].map((h,i) => (
            <th key={h} className={`mono text-xs font-medium text-slate-600 uppercase tracking-widest pb-3 ${i===0?'text-left':'text-right'} ${i>3?'hidden sm:table-cell':''}`}>{h}</th>
          ))}
        </tr>
      </thead>
      <tbody>
        {groups.map(g => {
          const items = IOL_POSITIONS.filter(p => p.group === g.k);
          if (!items.length) return null;
          return [
            <tr key={`sep-${g.k}`}>
              <td colSpan={6} className="mono text-xs text-slate-600 uppercase tracking-widest py-2 pt-4" style={{borderTop:'1px solid rgba(255,255,255,0.04)'}}>{g.l}</td>
            </tr>,
            ...items.map(p => {
              const px = getPriceARS(p, prices);
              const val = px ? px*p.qty : p.cost*p.qty;
              const pct = (px && p.cost) ? ((px-p.cost)/p.cost*100) : null;
              return (
                <tr key={p.ticker} className="row-hover">
                  <td className="py-2.5">
                    <div className="mono text-sm font-semibold text-white">{p.ticker}</div>
                    <div className="mono text-xs text-slate-500 mt-0.5">{p.name}</div>
                  </td>
                  <td className="mono text-sm text-right text-slate-400">{n(p.qty)}</td>
                  <td className="mono text-sm text-right text-white">{px ? n(px, px<1000?2:0) : <span className="text-slate-600">—</span>}</td>
                  <td className="mono text-sm text-right text-slate-300">{n(val)}</td>
                  <td className="text-right hidden sm:table-cell">
                    {pct !== null
                      ? <span className={`mono text-xs font-semibold ${pct>=0?'positive':'negative'}`}>{pct>=0?'▲':'▼'} {Math.abs(pct).toFixed(1)}%</span>
                      : <span className="mono text-xs text-slate-600">—</span>
                    }
                  </td>
                  <td className="text-right hidden sm:table-cell">
                    <Badge type={p.action}>{p.label}</Badge>
                  </td>
                </tr>
              );
            })
          ];
        })}
      </tbody>
    </table>
  );
}

              <td className="text-right"><Badge type="buy">1 abril</Badge></td>

        })}

}

      </thead>
      <tbody>
        {CRYPTO_POSITIONS.map(p => {
          const px = p.sym && prices[p.sym] ? prices[p.sym] : null;
          const val = px ? px*p.qty : p.cost*p.qty;
          const pct = (px && p.cost) ? ((px-p.cost)/p.cost*100) : null;
          return (
            <tr key={p.ticker} className="row-hover">
              <td className="py-3">
                <div className="mono text-sm font-semibold text-white">{p.ticker}</div>
                <div className="mono text-xs text-slate-500 mt-0.5">{p.name}</div>
              </td>
              <td className="mono text-sm text-right text-slate-300">{p.qty.toFixed(6)}</td>
              <td className="mono text-sm text-right text-white">{px ? n(px,0) : n(p.cost,0)} <span className="text-slate-600 text-xs">USD</span></td>
              <td className="mono text-sm text-right text-slate-300">{n(val,2)} <span className="text-slate-600 text-xs">USD</span></td>
              <td className="text-right">
                {pct !== null
                  ? <span className={`mono text-xs font-semibold ${pct>=0?'positive':'negative'}`}>{pct>=0?'▲':'▼'} {Math.abs(pct).toFixed(1)}%</span>
                  : <span className="mono text-xs" style={{color:'#f59e0b'}}>entrada USD {n(p.cost,0)}</span>
                }
              </td>
              <td className="text-right"><span className="mono text-xs px-2 py-0.5 rounded" style={{background:'rgba(34,211,238,0.08)',color:'#22d3ee'}}>{p.platform}</span></td>
            </tr>
          );
        })}
      </tbody>
    </table>
  );
}

function PlanList() {
  const dotColor = { hot:'#f87171', warm:'#f59e0b', cold:'#475569' };
  const badgeStyle = {
    hot:  'bg-red-500/10 text-red-400 border border-red-500/20',
    warm: 'bg-amber-500/10 text-amber-400 border border-amber-500/20',
    cold: 'bg-slate-700/50 text-slate-500 border border-slate-700',
  };
  const badgeLabel = { hot:'HOY', warm:'MAÑANA', cold:'FUTURO' };

  return (
    <div className="space-y-0">
      {PLAN_ITEMS.map((item, i) => (
        <div key={i} className="flex items-center gap-4 py-3 row-hover px-1 rounded-lg" style={{borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
          <div className="mono text-xs text-slate-600 w-12 flex-shrink-0">{item.date}</div>
          <div className="w-1.5 h-1.5 rounded-full flex-shrink-0" style={{background:dotColor[item.urgency]}}/>
          <div className="flex-1 min-w-0">
            <span className="mono text-xs font-bold text-white mr-2">{item.ticker}</span>
            <span className="text-xs text-slate-400">{item.desc}</span>
          </div>
          <span className={`mono text-xs px-2 py-0.5 rounded-md font-semibold flex-shrink-0 ${badgeStyle[item.urgency]}`}>{badgeLabel[item.urgency]}</span>
        </div>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════
// KPI CARD
// ═══════════════════════════════════════════

function KpiCard({ label, value, sub, subColor='neutral', accent, delay='' }) {
  const subColors = {
    positive: 'positive',
    negative: 'negative',
    neutral:  'neutral',
  };
  return (
    <div className={`bento-card p-5 relative overflow-hidden fade-up-${delay}`}>
      <div className="absolute top-0 left-0 right-0 h-px opacity-60" style={{background:`linear-gradient(90deg, transparent, ${accent}, transparent)`}}/>
      <p className="mono text-xs text-slate-600 uppercase tracking-widest mb-2">{label}</p>
      <p className="mono text-2xl font-semibold text-white leading-none mb-1.5">{value}</p>
      <p className={`mono text-xs ${subColors[subColor]}`}>{sub}</p>
    </div>
  );
}

// ═══════════════════════════════════════════
// CONFIG PANEL
// ═══════════════════════════════════════════

function ConfigPanel({ open, onClose, onSave }) {
  const [url, setUrl] = useState('');
  const [mep, setMep] = useState(1422);

  useEffect(() => {
    try { const c = JSON.parse(localStorage.getItem('pf_cfg')||'{}'); if (c.url) setUrl(c.url); if (c.mep) setMep(c.mep); } catch {}
  }, [open]);

  const save = () => { localStorage.setItem('pf_cfg', JSON.stringify({url, mep})); onSave(); onClose(); };

  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-start justify-end" style={{background:'rgba(0,0,0,.6)',backdropFilter:'blur(6px)'}} onClick={onClose}>
      <div className="w-96 h-screen overflow-y-auto p-8" style={{background:'#161B22',borderLeft:'1px solid rgba(255,255,255,0.08)'}} onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between mb-8">
          <h2 className="text-lg font-bold text-white">Configuración</h2>
          <button onClick={onClose} className="text-slate-500 hover:text-white transition-colors text-xl cursor-pointer">✕</button>
        </div>

        <div className="space-y-6">
          <div>
            <label className="mono text-xs text-slate-500 uppercase tracking-widest block mb-2">URL Apps Script</label>
            <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://script.google.com/macros/s/..."
              className="w-full px-4 py-3 rounded-xl mono text-xs text-white outline-none transition-all"
              style={{background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)'}}
              onFocus={e=>e.target.style.borderColor='rgba(99,102,241,0.5)'}
              onBlur={e=>e.target.style.borderColor='rgba(255,255,255,0.08)'}
            />
            <p className="mono text-xs text-slate-600 mt-2 leading-relaxed">Pegá la URL del Apps Script deployado para sincronizar posiciones.</p>
          </div>

          <div>
            <label className="mono text-xs text-slate-500 uppercase tracking-widest block mb-2">Dólar MEP (ARS)</label>
            <input type="number" value={mep} onChange={e=>setMep(e.target.value)}
              className="w-full px-4 py-3 rounded-xl mono text-sm text-white outline-none"
              style={{background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)'}}
            />
          </div>

          <button onClick={save} className="w-full py-3 rounded-xl mono text-sm font-bold text-black cursor-pointer transition-all hover:opacity-90"
            style={{background:'linear-gradient(135deg,#6366f1,#8b5cf6)'}}>
            Guardar y recargar
          </button>

          <div className="rounded-xl p-5 space-y-3" style={{background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.05)'}}>
            <p className="mono text-xs text-slate-500 uppercase tracking-widest">Cómo conectar Google Sheet</p>
            {['Abrí tu Sheet → Extensions → Apps Script','Pegá el código de APPS_SCRIPT.gs','Deploy → New deployment → Web app','Execute as: Me · Access: Anyone','Copiá la URL y pegala arriba 👆'].map((s,i) => (
              <div key={i} className="flex gap-3 items-start">
                <div className="w-5 h-5 rounded-full mono text-xs flex items-center justify-center flex-shrink-0 mt-0.5"
                  style={{background:'rgba(99,102,241,0.1)',border:'1px solid rgba(99,102,241,0.2)',color:'#818cf8'}}>{i+1}</div>
                <p className="text-xs text-slate-500 leading-relaxed">{s}</p>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// NAV SIDEBAR
// ═══════════════════════════════════════════

function Sidebar({ onCfg }) {
  const icons = [
    { icon:'⊞', label:'Dashboard', active:true },
    { icon:'◈', label:'Portfolio' },
    { icon:'↕', label:'Transacciones' },
  ];
  return (
    <aside className="hidden md:flex flex-col items-center gap-2 py-6 px-3" style={{width:64,background:'#0d1016',borderRight:'1px solid rgba(255,255,255,0.05)'}}>
      <div className="w-9 h-9 rounded-xl flex items-center justify-center mb-6 text-lg"
        style={{background:'linear-gradient(135deg,#6366f1,#8b5cf6)',boxShadow:'0 0 20px rgba(99,102,241,0.3)'}}>
        📈
      </div>
      {icons.map(i => (
        <div key={i.label} title={i.label}
          className={`w-10 h-10 rounded-xl flex items-center justify-center cursor-pointer transition-all text-base ${i.active ? 'text-indigo-400' : 'text-slate-600 hover:text-slate-400'}`}
          style={i.active ? {background:'rgba(99,102,241,0.12)',border:'1px solid rgba(99,102,241,0.2)'} : {}}>
          {i.icon}
        </div>
      ))}
      <div className="flex-1"/>
      <div onClick={onCfg} title="Configuración"
        className="w-10 h-10 rounded-xl flex items-center justify-center cursor-pointer text-slate-600 hover:text-slate-400 transition-all text-base">
        ⚙
      </div>
    </aside>
  );
}

// ═══════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════

function App() {
  const [prices, setPrices]     = useState({});
  const [loading, setLoading]   = useState(true);
  const [lastUpdate, setLastUpdate] = useState('');
  const [cfgOpen, setCfgOpen]   = useState(false);
  const [activeTab, setActiveTab] = useState('iol');
  const [spinning, setSpinning] = useState(false);

  const loadPrices = useCallback(async () => {
    setSpinning(true);
    const syms = [...new Set([
      ...IOL_POSITIONS.map(p=>p.sym).filter(Boolean),
      ...TASTY_POSITIONS.map(p=>p.sym).filter(Boolean),
      ...CRYPTO_POSITIONS.map(p=>p.sym).filter(Boolean),
    ])];
    const res = await Promise.all(syms.map(s => fetchLivePrice(s).then(p=>({s,p}))));
    const map = {};
    res.forEach(({s,p}) => { if (p) map[s] = p; });
    setPrices(map);
    setLastUpdate(new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}));
    setLoading(false);
    setSpinning(false);
  }, []);

  useEffect(() => { loadPrices(); }, []);

  // Compute KPIs
  let iolTotal = 0, iolCost = 0;
  IOL_POSITIONS.forEach(p => {
    const px = getPriceARS(p, prices);
    iolTotal += px ? px*p.qty : p.cost*p.qty;
    iolCost  += p.cost * p.qty;
  });
  const iolPnl    = iolTotal - iolCost;
  const iolPnlPct = iolCost ? (iolPnl/iolCost*100) : 0;
  const btcPos    = CRYPTO_POSITIONS[0];
  const btcPx     = prices['BTC-USD'];
  const btcVal    = btcPx ? btcPx*btcPos.qty : btcPos.cost*btcPos.qty;
  const btcPct    = btcPx ? ((btcPx-btcPos.cost)/btcPos.cost*100) : null;

  return (
    <div className="flex min-h-screen" style={{background:'#0F111A'}}>
      <Sidebar onCfg={() => setCfgOpen(true)}/>

      <div className="flex-1 flex flex-col overflow-hidden">
        {/* Header */}
        <header className="flex items-center justify-between px-8 py-5 fade-up" style={{borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
          <div>
            <h1 className="text-xl font-bold text-white tracking-tight">Mi Portafolio</h1>
            <p className="mono text-xs text-slate-600 mt-0.5">
              {loading ? <span className="loading-pulse">cargando precios...</span> : `actualizado ${lastUpdate}`}
            </p>
          </div>
          <div className="flex items-center gap-3">
            <div className="flex items-center gap-2 px-3 py-1.5 rounded-lg" style={{background:'rgba(16,185,129,0.08)',border:'1px solid rgba(16,185,129,0.15)'}}>
              <div className="w-1.5 h-1.5 rounded-full bg-emerald-500" style={{animation:'shimmer 2s infinite'}}/>
              <span className="mono text-xs text-emerald-500 font-semibold">en vivo</span>
            </div>
            <button onClick={() => setCfgOpen(true)}
              className="px-3 py-1.5 rounded-lg mono text-xs text-slate-400 cursor-pointer transition-all hover:text-white"
              style={{background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.07)'}}>
              ⚙ Sheet
            </button>
            <button onClick={loadPrices} disabled={spinning}
              className="px-4 py-1.5 rounded-lg mono text-xs font-bold text-black cursor-pointer transition-all hover:opacity-90"
              style={{background:'linear-gradient(135deg,#6366f1,#8b5cf6)',opacity:spinning?.6:1}}>
              <span style={{display:'inline-block',animation:spinning?'spin .7s linear infinite':'none'}}>↻</span> Actualizar
            </button>
          </div>
        </header>

        {/* Content */}
        <main className="flex-1 overflow-auto p-6">

          {/* KPIs */}
          <div className="grid grid-cols-2 md:grid-cols-5 gap-3 mb-5">
            <KpiCard delay="1" label="Total IOL · ARS" value={loading ? '...' : '$'+n(iolTotal)}
              sub={loading ? '—' : `${iolPnl>=0?'▲':'▼'} ${Math.abs(iolPnlPct).toFixed(1)}% total`}
              subColor={iolPnl>=0?'positive':'negative'} accent="#6366f1"/>
            <KpiCard delay="2" label="Tastytrade · USD" value="USD 0" sub="fondeo 1 abril" subColor="neutral" accent="#22d3ee"/>
            <KpiCard delay="3" label="Bitcoin · USD" value={loading ? '...' : `USD ${n(btcVal,2)}`}
              sub={btcPct!=null ? `${btcPct>=0?'▲':'▼'} ${Math.abs(btcPct).toFixed(1)}% vs entrada` : `entrada USD ${n(btcPos.cost,0)}`}
              subColor={btcPct!=null?(btcPct>=0?'positive':'negative'):'neutral'} accent="#f59e0b"/>
            <KpiCard delay="4" label="Dólar MEP" value="$1.422" sub="referencia manual" subColor="neutral" accent="#a78bfa"/>
            <KpiCard delay="5" label="Riesgo País" value="595 pb" sub="↓ mínimo reciente" subColor="positive" accent="#10b981"/>
          </div>

          {/* Bento grid */}
          <div className="grid gap-4" style={{gridTemplateColumns:'1fr 1fr 340px',gridTemplateRows:'260px auto'}}>

            {/* Chart - spans 2 cols */}
            <div className="bento-card p-6 fade-up-2" style={{gridColumn:'1/3'}}>
              <PerformanceChart prices={prices}/>
            </div>

            {/* Distribution */}
            <div className="bento-card p-6 fade-up-3" style={{gridRow:'1/2'}}>
              <DistributionCard prices={prices}/>
            </div>

            {/* Positions table - full width */}
            <div className="bento-card p-6 fade-up-4" style={{gridColumn:'1/4'}}>
              <PositionsTable prices={prices} activeTab={activeTab} setActiveTab={setActiveTab}/>
            </div>

          </div>
        </main>
      </div>

      <ConfigPanel open={cfgOpen} onClose={() => setCfgOpen(false)} onSave={loadPrices}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
